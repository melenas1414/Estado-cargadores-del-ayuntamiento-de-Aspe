name: Monitor Cargadores EV — Aspe

on:
  schedule:
    # Ejecutar cada 15 minutos exactos
    - cron: '*/15 * * * *'
  # Permite ejecución manual desde la interfaz de GitHub Actions
  workflow_dispatch:

jobs:
  monitorizar:
    name: Consultar estado y guardar en Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/package.json

      - name: 📦 Instalar dependencias del scraper
        working-directory: services
        run: npm ci

      - name: 🔌 Ejecutar scraper
        working-directory: services
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          IBERDROLA_API_URL: ${{ secrets.IBERDROLA_API_URL }}
          IBERDROLA_API_KEY: ${{ secrets.IBERDROLA_API_KEY }}
          OCM_API_KEY:       ${{ secrets.OCM_API_KEY }}
        run: node scraper.mjs
