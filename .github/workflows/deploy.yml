name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VERCEL_CLI_VERSION: '39.4.2'

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'app/**'
      - 'server/**'
      - 'nuxt.config.ts'
      - 'tailwind.config.ts'
      - 'package.json'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detectar-cambios:
    name: Detectar cambios desplegables
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v5

      - name: 🔎 Clasificar cambios
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'server/**'
              - 'nuxt.config.ts'
              - 'tailwind.config.ts'
              - 'package.json'
              - 'vercel.json'
              - '.github/workflows/deploy.yml'

  desplegar-frontend:
    name: Desplegar frontend en Vercel
    runs-on: ubuntu-latest
    needs: detectar-cambios
    if: github.event_name == 'workflow_dispatch' || needs.detectar-cambios.outputs.frontend == 'true'
    environment: cargadores-app-status

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v5

      - name: 🟢 Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: ▲ Instalar Vercel CLI
        run: |
          npm install --global vercel@${VERCEL_CLI_VERSION}
          vercel --version

      - name: ⚙️ Forzar Node.js 22 en Vercel
        run: |
          set -euo pipefail

          BODY='{"nodeVersion":"22.x"}'

          STATUS=$(curl -sS -o /tmp/vercel-project-update.json -w "%{http_code}" \
            -X PATCH "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$BODY")

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Fallo PATCH con teamId (HTTP $STATUS), reintentando sin teamId..."

            STATUS=$(curl -sS -o /tmp/vercel-project-update.json -w "%{http_code}" \
              -X PATCH "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data "$BODY")
          fi

          echo "HTTP update project: $STATUS"
          cat /tmp/vercel-project-update.json

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::No se pudo forzar nodeVersion=22.x en Vercel"
            exit 1
          fi

      - name: 🔗 Sincronizar configuración de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🏗️ Construir artefacto de producción
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NITRO_PRESET: vercel

      - name: 🚀 Publicar en Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}