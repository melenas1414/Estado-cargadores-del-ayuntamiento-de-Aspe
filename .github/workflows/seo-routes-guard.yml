name: SEO Routes Guard

on:
  pull_request:
    paths:
      - app/pages/index.vue
      - nuxt.config.ts
      - server/routes/sitemap.xml.ts
      - server/routes/sitemap-pages.xml.ts
      - .github/copilot-instructions.md
      - scripts/check-friendly-routes.mjs
      - .github/workflows/seo-routes-guard.yml
  push:
    branches:
      - main
      - master
    paths:
      - app/pages/index.vue
      - nuxt.config.ts
      - server/routes/sitemap.xml.ts
      - server/routes/sitemap-pages.xml.ts
      - .github/copilot-instructions.md
      - scripts/check-friendly-routes.mjs
      - .github/workflows/seo-routes-guard.yml

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check friendly routes and SEO rules
        run: node scripts/check-friendly-routes.mjs
